<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">Missing media placeholder</title>
  <desc id="desc">A local placeholder shown while media files are missing.</desc>
  <rect width="1200" height="675" fill="#0a0705"/>
  <rect x="32" y="32" width="1136" height="611" fill="none" stroke="#dccdb6" stroke-opacity=".24" stroke-width="2"/>
  <g fill="#dccdb6" font-family="monospace" text-anchor="middle">
    <text x="600" y="315" font-size="34" fill-opacity=".82">media offline</text>
    <text x="600" y="365" font-size="20" fill-opacity=".52">replace this placeholder with a local file</text>
  </g>
</svg>
